apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: hrms-cluster
  region: us-east-1
  version: "1.32"

managedNodeGroups:
  - name: hrms-nodegroup
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 20
    privateNetworking: false

iam:
  withOIDC: true

cloudWatch:
  clusterLogging:
    enableTypes:
      - "*"
